[build]
  command = "npm ci && npm run build"
  publish = "dist"

# Proxy /api to Render (works even if VITE_API_URL was missing at build time).
# Must come BEFORE the SPA catch-all below.
[[redirects]]
  from = "/api/*"
  to = "https://mcq-extractor-iu8r.onrender.com/api/:splat"
  status = 200
  force = true

# SPA routing: send unknown paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
