name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcq-extractor/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: mcq-extractor/backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          APP_SECRET: test-secret-please-rotate
          MONGODB_URI: mongomock://
        run: pytest -q

  frontend-build:
    name: Frontend (vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcq-extractor/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcq-extractor/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build
